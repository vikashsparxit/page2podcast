<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page2Podcast — Store Assets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px 32px 80px;
      background: #f4f4f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #18181b;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 6px;
      color: #09090b;
    }
    .subtitle {
      font-size: 14px;
      color: #71717a;
      margin: 0 0 48px;
    }
    .asset-section {
      margin-bottom: 64px;
    }
    .asset-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }
    .asset-title {
      font-size: 16px;
      font-weight: 600;
      color: #09090b;
      letter-spacing: -0.02em;
    }
    .asset-dims {
      font-size: 13px;
      color: #71717a;
      font-variant-numeric: tabular-nums;
    }
    .canvas-wrap {
      display: inline-block;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.10);
      max-width: 100%;
    }
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 9px 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.01em;
      transition: background 0.12s, transform 0.08s;
    }
    .download-btn:hover { background: #4f46e5; transform: translateY(-1px); }
    .download-btn:active { transform: translateY(0); }
    .download-btn svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <h1>Page2Podcast — Store Assets</h1>
  <p class="subtitle">Chrome Web Store promotional images — export as PNG for upload.</p>

  <div class="asset-section">
    <div class="asset-header">
      <span class="asset-title">Asset 1 — Screenshot</span>
      <span class="asset-dims">1280 × 800</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="c1" width="1280" height="800"></canvas>
    </div><br>
    <button class="download-btn" onclick="downloadCanvas('c1','page2podcast-screenshot-1280x800.png')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PNG
    </button>
  </div>

  <div class="asset-section">
    <div class="asset-header">
      <span class="asset-title">Asset 2 — Screenshot 2 (Settings)</span>
      <span class="asset-dims">1280 × 800</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="c2" width="1280" height="800"></canvas>
    </div><br>
    <button class="download-btn" onclick="downloadCanvas('c2','page2podcast-settings-1280x800.png')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PNG
    </button>
  </div>

  <div class="asset-section">
    <div class="asset-header">
      <span class="asset-title">Asset 3 — Small Promo Tile</span>
      <span class="asset-dims">440 × 280</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="c3" width="440" height="280"></canvas>
    </div><br>
    <button class="download-btn" onclick="downloadCanvas('c3','page2podcast-small-tile-440x280.png')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PNG
    </button>
  </div>

  <div class="asset-section">
    <div class="asset-header">
      <span class="asset-title">Asset 4 — Marquee Promo Tile</span>
      <span class="asset-dims">1400 × 560</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="c4" width="1400" height="560"></canvas>
    </div><br>
    <button class="download-btn" onclick="downloadCanvas('c4','page2podcast-marquee-1400x560.png')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PNG
    </button>
  </div>

  <script>
  // ─────────────────────────────────────────
  // CONSTANTS
  // ─────────────────────────────────────────
  const BG       = '#09090b';
  const SURFACE  = '#18181b';
  const SURFACE2 = '#27272a';
  const ACCENT   = '#6366f1';
  const TEXT     = '#fafafa';
  const TEXT2    = '#a1a1aa';
  const TEXT3    = '#52525b';
  const BORDER   = 'rgba(255,255,255,0.06)';
  const BORDERS  = 'rgba(255,255,255,0.10)';
  const SUCCESS  = '#4ade80';
  const ACCENTDIM = 'rgba(99,102,241,0.12)';

  // ─────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────

  // Filled rounded rect
  function fillRoundRect(ctx, x, y, w, h, r, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
    ctx.restore();
  }

  // Stroked rounded rect
  function strokeRoundRect(ctx, x, y, w, h, r, color, lineWidth = 1) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.stroke();
    ctx.restore();
  }

  // Fill + stroke rounded rect
  function drawRoundRect(ctx, x, y, w, h, r, fill, stroke, lineWidth = 1) {
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
    ctx.restore();
  }

  // Waveform logo — draws 5 bars matching the actual SVG in popup.html
  // The SVG has bars at x=0,5,10,15,20 with heights 5,11,16,9,4 (y offset from top of 16px space)
  // We scale to targetHeight
  function drawWaveform(ctx, cx, cy, targetHeight) {
    // bar definitions: [relativeHeight, relativeOpacity]
    const bars = [
      { rh: 5/16,  x: 0  },
      { rh: 11/16, x: 5  },
      { rh: 16/16, x: 10 },
      { rh: 9/16,  x: 15 },
      { rh: 4/16,  x: 20 },
    ];
    const barW_src = [3, 3, 3, 3, 2];
    const totalW_src = 22;
    const scale = targetHeight / 16;
    const totalW = totalW_src * scale;
    const startX = cx - totalW / 2;

    bars.forEach((b, i) => {
      const bh = b.rh * targetHeight;
      const bw = barW_src[i] * scale;
      const bx = startX + b.x * scale;
      const by = cy - bh / 2;
      const rx = Math.min(bw / 2, bh / 2, 1.5 * scale);
      const opacity = 0.4 + 0.6 * b.rh;
      ctx.save();
      ctx.globalAlpha = opacity;
      fillRoundRect(ctx, bx, by, bw, bh, rx, ACCENT);
      ctx.restore();
    });
  }

  // Text with single-line clip
  function drawText(ctx, text, x, y, font, color, align = 'left', baseline = 'alphabetic', maxWidth) {
    ctx.save();
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    if (maxWidth !== undefined) {
      ctx.fillText(text, x, y, maxWidth);
    } else {
      ctx.fillText(text, x, y);
    }
    ctx.restore();
  }

  // Pill / badge
  function drawPill(ctx, cx, cy, label, bgColor, borderColor, textColor, fontSize, paddingX, paddingY, radius) {
    ctx.save();
    ctx.font = `500 ${fontSize}px system-ui`;
    const tw = ctx.measureText(label).width;
    const pw = tw + paddingX * 2;
    const ph = fontSize + paddingY * 2;
    const bx = cx - pw / 2;
    const by = cy - ph / 2;
    drawRoundRect(ctx, bx, by, pw, ph, radius, bgColor, borderColor, 1);
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, cx, cy);
    ctx.restore();
    return { x: bx, y: by, w: pw, h: ph };
  }

  // Input field mockup
  function drawInput(ctx, x, y, w, h, placeholder, value, radius = 8) {
    drawRoundRect(ctx, x, y, w, h, radius, BG, BORDERS, 1);
    const textY = y + h / 2;
    if (value) {
      drawText(ctx, value, x + 10, textY, '500 12px system-ui', TEXT2, 'left', 'middle');
    } else {
      drawText(ctx, placeholder, x + 10, textY, '500 12px system-ui', TEXT3, 'left', 'middle');
    }
  }

  // Select field mockup
  function drawSelect(ctx, x, y, w, h, value, radius = 8) {
    drawRoundRect(ctx, x, y, w, h, radius, BG, BORDERS, 1);
    const textY = y + h / 2;
    drawText(ctx, value, x + 10, textY, '500 12px system-ui', TEXT, 'left', 'middle');
    // chevron
    ctx.save();
    ctx.strokeStyle = TEXT3;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const cx2 = x + w - 14;
    const cy2 = y + h / 2;
    ctx.beginPath();
    ctx.moveTo(cx2 - 4, cy2 - 2);
    ctx.lineTo(cx2, cy2 + 2);
    ctx.lineTo(cx2 + 4, cy2 - 2);
    ctx.stroke();
    ctx.restore();
  }

  // Indigo glow radial gradient
  function drawGlow(ctx, cx, cy, r, alpha = 0.18) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, `rgba(99,102,241,${alpha})`);
    g.addColorStop(1, 'rgba(99,102,241,0)');
    ctx.save();
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Wrap text into lines
  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  // Download helper
  function downloadCanvas(id, filename) {
    const canvas = document.getElementById(id);
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  }

  // ─────────────────────────────────────────
  // SHARED COMPONENT: Extension Side Panel
  // Draws the popup UI into a given rect
  // ─────────────────────────────────────────
  function drawExtensionPanel(ctx, px, py, pw, ph, opts = {}) {
    const {
      scale = 1,
      showDownload = true,
      showScript = true,
      activeStep = 2, // 0=extract 1=plan 2=script 3=audio 4=done
    } = opts;

    // Panel background
    drawRoundRect(ctx, px, py, pw, ph, 12 * scale, SURFACE, BORDER, 1);

    let y = py + 14 * scale;
    const pad = 14 * scale;
    const innerW = pw - pad * 2;
    const lx = px + pad;

    // ── Header ──────────────────
    const logoH = 16 * scale;
    const logoCY = y + logoH / 2;
    drawWaveform(ctx, lx + 11 * scale, logoCY, logoH);
    drawText(ctx, 'Page2Podcast', lx + 24 * scale, logoCY, `600 ${14 * scale}px system-ui`, TEXT, 'left', 'middle');
    // Gear icon (circle + spokes approximation)
    const gx = px + pw - pad - 8 * scale;
    const gy = logoCY;
    const gr = 5 * scale;
    ctx.save();
    ctx.strokeStyle = TEXT3;
    ctx.lineWidth = 1.2 * scale;
    ctx.lineCap = 'round';
    // gear outer ring
    ctx.beginPath();
    ctx.arc(gx, gy, gr, 0, Math.PI * 2);
    ctx.stroke();
    // gear center
    ctx.beginPath();
    ctx.arc(gx, gy, gr * 0.42, 0, Math.PI * 2);
    ctx.stroke();
    // gear teeth (8 small lines)
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(gx + Math.cos(a) * gr, gy + Math.sin(a) * gr);
      ctx.lineTo(gx + Math.cos(a) * (gr + 2.2 * scale), gy + Math.sin(a) * (gr + 2.2 * scale));
      ctx.stroke();
    }
    ctx.restore();
    y += logoH + 12 * scale;

    // ── Tab switcher ──────────────────────────
    const tabH = 28 * scale;
    drawRoundRect(ctx, lx, y, innerW, tabH, 10 * scale, BG, BORDER, 1);
    // Active tab: Generate
    drawRoundRect(ctx, lx + 3 * scale, y + 3 * scale, (innerW / 2) - 4 * scale, tabH - 6 * scale, 7 * scale, SURFACE2, null);
    drawText(ctx, 'Generate', lx + innerW / 4, y + tabH / 2, `500 ${12 * scale}px system-ui`, TEXT, 'center', 'middle');
    drawText(ctx, 'History', lx + (innerW * 3 / 4), y + tabH / 2, `500 ${12 * scale}px system-ui`, TEXT3, 'center', 'middle');
    y += tabH + 12 * scale;

    // ── Status row ──────────────────────────
    const statusH = 34 * scale;
    drawRoundRect(ctx, lx, y, innerW, statusH, 8 * scale, BG, `rgba(99,102,241,0.3)`, 1);
    // Indigo dot
    ctx.save();
    ctx.fillStyle = ACCENT;
    ctx.beginPath();
    ctx.arc(lx + 10 * scale, y + statusH / 2, 3.5 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    drawText(ctx, 'STATUS', lx + 20 * scale, y + statusH / 2, `600 ${9 * scale}px system-ui`, TEXT3, 'left', 'middle');
    drawText(ctx, 'Script ready. Review and generate audio.', lx + 55 * scale, y + statusH / 2, `400 ${11 * scale}px system-ui`, TEXT2, 'left', 'middle', innerW - 60 * scale);
    y += statusH + 12 * scale;

    // ── Steps ──────────────────────────────
    const steps = ['Extracting', 'Planning', 'Script', 'Audio', 'Done'];
    const stepSpacing = innerW / steps.length;
    const lineY = y + 4.5 * scale;
    // connector line
    ctx.save();
    ctx.strokeStyle = BORDERS;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lx + stepSpacing * 0.5, lineY);
    ctx.lineTo(lx + stepSpacing * 4.5, lineY);
    ctx.stroke();
    ctx.restore();
    steps.forEach((s, i) => {
      const sx = lx + stepSpacing * (i + 0.5);
      const dotR = 4.5 * scale;
      const isActive = i === activeStep;
      const isDone = i < activeStep;
      if (isActive) {
        // glow ring
        ctx.save();
        ctx.fillStyle = ACCENTDIM;
        ctx.beginPath();
        ctx.arc(sx, lineY, dotR + 2.5 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.fillStyle = ACCENT;
        ctx.beginPath();
        ctx.arc(sx, lineY, dotR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (isDone) {
        ctx.save();
        ctx.fillStyle = ACCENT;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(sx, lineY, dotR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else {
        drawRoundRect(ctx, sx - dotR, lineY - dotR, dotR * 2, dotR * 2, dotR, SURFACE2, BORDERS, 1.5);
      }
      drawText(ctx, s, sx, lineY + 9 * scale, `${isActive ? 600 : 500} ${9 * scale}px system-ui`, isActive ? TEXT : TEXT3, 'center', 'top');
    });
    y += 9 * scale + 14 * scale + 12 * scale;

    // ── Page row ──────────────────────────
    const pageH = 28 * scale;
    drawRoundRect(ctx, lx, y, innerW, pageH, 8 * scale, BG, BORDER, 1);
    drawText(ctx, 'PAGE', lx + 10 * scale, y + pageH / 2, `600 ${9 * scale}px system-ui`, TEXT3, 'left', 'middle');
    drawText(ctx, 'What Are AI Agents? Definition, Types...', lx + 50 * scale, y + pageH / 2, `400 ${11 * scale}px system-ui`, TEXT2, 'left', 'middle', innerW - 56 * scale);
    y += pageH + 10 * scale;

    // ── Generate button ──────────────────────
    const btnH = 36 * scale;
    drawRoundRect(ctx, lx, y, innerW, btnH, 8 * scale, ACCENT, null);
    // play icon
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    const px2 = lx + 20 * scale;
    const py2 = y + btnH / 2;
    ctx.moveTo(px2, py2 - 5 * scale);
    ctx.lineTo(px2 + 8 * scale, py2);
    ctx.lineTo(px2, py2 + 5 * scale);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    drawText(ctx, 'Generate Podcast Audio', lx + innerW / 2 + 6 * scale, y + btnH / 2, `500 ${13 * scale}px system-ui`, '#fff', 'center', 'middle');
    y += btnH + 10 * scale;

    // ── Script section ──────────────────────
    if (showScript) {
      const scriptContH = 115 * scale;
      drawRoundRect(ctx, lx, y, innerW, scriptContH, 8 * scale, null, BORDER, 1);
      // Summary bar
      const summH = 32 * scale;
      fillRoundRect(ctx, lx, y, innerW, summH, 8 * scale, BG);
      // chevron
      ctx.save();
      ctx.strokeStyle = TEXT3;
      ctx.lineWidth = 1.2 * scale;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(lx + 12 * scale, y + summH / 2 - 3 * scale);
      ctx.lineTo(lx + 15 * scale, y + summH / 2);
      ctx.lineTo(lx + 12 * scale, y + summH / 2 + 3 * scale);
      ctx.stroke();
      ctx.restore();
      // after open, chevron points down
      ctx.save();
      ctx.strokeStyle = TEXT3;
      ctx.lineWidth = 1.2 * scale;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(lx + 10 * scale, y + summH / 2 - 2 * scale);
      ctx.lineTo(lx + 13 * scale, y + summH / 2 + 2 * scale);
      ctx.lineTo(lx + 16 * scale, y + summH / 2 - 2 * scale);
      ctx.stroke();
      ctx.restore();
      drawText(ctx, 'Show generated script', lx + 22 * scale, y + summH / 2, `500 ${11.5 * scale}px system-ui`, TEXT2, 'left', 'middle');
      y += summH;
      // textarea area
      const taH = 60 * scale;
      fillRoundRect(ctx, lx, y, innerW, taH, 0, BG);
      ctx.save();
      ctx.strokeStyle = BORDER;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lx, y);
      ctx.lineTo(lx + innerW, y);
      ctx.stroke();
      ctx.restore();
      const scriptLines = [
        "Welcome to today's episode! We're diving into the world of",
        "AI agents — autonomous systems that perceive their environment,",
        "make decisions, and take actions to achieve specific goals..."
      ];
      scriptLines.forEach((line, i) => {
        drawText(ctx, line, lx + 10 * scale, y + (10 + i * 15) * scale, `400 ${11 * scale}px system-ui`, TEXT2);
      });
      y += taH;
      // script actions
      const actH = 36 * scale;
      drawRoundRect(ctx, lx, y, innerW, actH, 0, BG, null);
      ctx.save();
      ctx.strokeStyle = BORDER;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lx, y);
      ctx.lineTo(lx + innerW, y);
      ctx.stroke();
      ctx.restore();
      const actBtnW = (innerW - 8 * scale) / 2;
      drawRoundRect(ctx, lx + 8 * scale, y + 6 * scale, actBtnW - 4 * scale, actH - 12 * scale, 6 * scale, ACCENT, null);
      drawText(ctx, 'Generate Audio', lx + 8 * scale + (actBtnW - 4 * scale) / 2, y + actH / 2, `500 ${11 * scale}px system-ui`, '#fff', 'center', 'middle');
      drawRoundRect(ctx, lx + actBtnW + 8 * scale, y + 6 * scale, actBtnW - 4 * scale, actH - 12 * scale, 6 * scale, null, BORDERS, 1);
      drawText(ctx, 'Regenerate', lx + actBtnW + 8 * scale + (actBtnW - 4 * scale) / 2, y + actH / 2, `500 ${11 * scale}px system-ui`, TEXT2, 'center', 'middle');
      // round the bottom corners
      y += actH + 10 * scale;
    }

    // ── Download button ──────────────────────
    if (showDownload) {
      // separator
      ctx.save();
      ctx.strokeStyle = BORDER;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lx, y);
      ctx.lineTo(lx + innerW, y);
      ctx.stroke();
      ctx.restore();
      y += 10 * scale;
      const dlH = 36 * scale;
      drawRoundRect(ctx, lx, y, innerW, dlH, 8 * scale, 'rgba(74,222,128,0.10)', 'rgba(74,222,128,0.25)', 1);
      // download arrow icon
      ctx.save();
      ctx.strokeStyle = SUCCESS;
      ctx.lineWidth = 1.8 * scale;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      const dix = lx + 20 * scale;
      const diy = y + dlH / 2;
      ctx.beginPath();
      ctx.moveTo(dix, diy - 4 * scale);
      ctx.lineTo(dix, diy + 2 * scale);
      ctx.moveTo(dix - 3.5 * scale, diy - 1 * scale);
      ctx.lineTo(dix, diy + 3 * scale);
      ctx.lineTo(dix + 3.5 * scale, diy - 1 * scale);
      ctx.stroke();
      ctx.restore();
      drawText(ctx, '⬇ Download MP3', lx + innerW / 2 + 6 * scale, y + dlH / 2, `500 ${13 * scale}px system-ui`, SUCCESS, 'center', 'middle');
    }
  }

  // ─────────────────────────────────────────
  // ASSET 1 — Screenshot 1280×800
  // ─────────────────────────────────────────
  function drawAsset1() {
    const canvas = document.getElementById('c1');
    const ctx = canvas.getContext('2d');
    const W = 1280, H = 800;

    // Background
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    // Subtle indigo glow on right edge
    drawGlow(ctx, W, H * 0.5, 420, 0.22);

    // ── Browser mockup (left 2/3) ──────────────────
    const browserX = 24;
    const browserY = 60;
    const browserW = W - 320 - 48;
    const browserH = H - 120;

    // Browser outer shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetY = 8;
    drawRoundRect(ctx, browserX, browserY, browserW, browserH, 12, '#1a1a1e', null);
    ctx.restore();

    // Browser frame
    drawRoundRect(ctx, browserX, browserY, browserW, browserH, 12, '#1c1c1f', 'rgba(255,255,255,0.08)', 1);

    // Chrome bar
    const chromeH = 44;
    fillRoundRect(ctx, browserX, browserY, browserW, chromeH, 12, '#2a2a2e');
    // Bottom edge of chrome bar
    ctx.save();
    ctx.fillStyle = '#2a2a2e';
    ctx.fillRect(browserX, browserY + chromeH - 12, browserW, 12);
    ctx.restore();
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(browserX, browserY + chromeH);
    ctx.lineTo(browserX + browserW, browserY + chromeH);
    ctx.stroke();
    ctx.restore();

    // Traffic lights
    const tlColors = ['#ff5f57', '#ffbd2e', '#28c941'];
    tlColors.forEach((c, i) => {
      ctx.save();
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(browserX + 20 + i * 20, browserY + 22, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // URL bar
    const urlBarX = browserX + 80;
    const urlBarW = browserW - 160;
    const urlBarY = browserY + 9;
    const urlBarH = 26;
    drawRoundRect(ctx, urlBarX, urlBarY, urlBarW, urlBarH, 6, '#3a3a3e', 'rgba(255,255,255,0.06)', 1);
    // Lock icon
    ctx.save();
    ctx.strokeStyle = '#6b6b70';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(urlBarX + 14, urlBarY + urlBarH / 2 + 1, 4, Math.PI, 0);
    ctx.stroke();
    drawRoundRect(ctx, urlBarX + 10, urlBarY + urlBarH / 2 - 1, 8, 6, 2, '#6b6b70', null);
    ctx.restore();
    drawText(ctx, 'sparxitsolutions.com/blog/what-are-ai-agents/', urlBarX + 26, urlBarY + urlBarH / 2, '400 12px system-ui', '#9a9aa0', 'left', 'middle');

    // Content area
    const contentY = browserY + chromeH;
    const contentH = browserH - chromeH;
    ctx.fillStyle = '#f9fafb';
    ctx.fillRect(browserX + 1, contentY, browserW - 2, contentH - 1);
    // Simulate a rounded bottom on the browser
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(browserX + 1, contentY, browserW - 2, contentH - 1, [0, 0, 12, 12]);
    ctx.fillStyle = '#f9fafb';
    ctx.fill();
    ctx.restore();

    // Article content simulation
    const artX = browserX + 60;
    const artW = browserW - 120;

    // Breadcrumb
    drawText(ctx, 'Home / Blog / AI & ML', artX, contentY + 32, '400 11px system-ui', '#9ca3af');

    // H1
    ctx.save();
    ctx.font = 'bold 34px system-ui';
    ctx.fillStyle = '#111827';
    ctx.textBaseline = 'top';
    ctx.fillText('What Are AI Agents?', artX, contentY + 52);
    ctx.restore();

    // Subheadline
    drawText(ctx, 'Definition, Types, Examples & How They Work in 2025', artX, contentY + 98, '400 16px system-ui', '#6b7280', 'left', 'top');

    // Meta row
    ctx.save();
    ctx.fillStyle = '#e5e7eb';
    ctx.fillRect(artX, contentY + 124, artW, 1);
    ctx.restore();
    drawText(ctx, '📅  March 28, 2025   ·   ⏱ 8 min read   ·   ✍ Sarah Mitchell', artX, contentY + 136, '400 12px system-ui', '#9ca3af', 'left', 'top');

    // Body text lines
    const bodyLines = [
      'Artificial intelligence agents are software programs that can perceive their environment,',
      'make decisions, and take actions to achieve specific goals — all without constant human',
      'supervision. Unlike traditional AI models that simply respond to queries, AI agents operate',
      'autonomously, learn from feedback, and adapt their strategies over time.',
      '',
      'The concept of AI agents is rooted in multi-agent systems (MAS) research, which dates back',
      'to the 1980s. However, with recent advances in large language models (LLMs) like GPT-4,',
      'Claude, and Gemini, AI agents have become far more capable — and far more accessible.',
    ];
    bodyLines.forEach((line, i) => {
      if (!line) return;
      drawText(ctx, line, artX, contentY + 172 + i * 22, '400 14px system-ui', '#374151', 'left', 'top');
    });

    // Pull quote box
    const pqY = contentY + 360;
    ctx.save();
    ctx.fillStyle = '#eff6ff';
    ctx.strokeStyle = '#93c5fd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(artX, pqY, artW * 0.75, 80, 8);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    // Left bar
    ctx.save();
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(artX, pqY, 3, 80);
    ctx.restore();
    drawText(ctx, '"AI agents represent the next frontier of software — systems that', artX + 16, pqY + 16, 'italic 13px system-ui', '#1e40af', 'left', 'top');
    drawText(ctx, 'don\'t just answer questions but take initiative and act."', artX + 16, pqY + 36, 'italic 13px system-ui', '#1e40af', 'left', 'top');
    drawText(ctx, '— Sparxit Solutions Research Team', artX + 16, pqY + 58, '400 11px system-ui', '#3b82f6', 'left', 'top');

    // ── Extension side panel (right 320px) ────────────────
    const panelX = W - 320 - 12;
    const panelY = 60;
    const panelW = 320;
    const panelH = H - 120;

    drawExtensionPanel(ctx, panelX, panelY, panelW, panelH, {
      scale: 1,
      showDownload: true,
      showScript: true,
      activeStep: 2,
    });

    // ── Bottom overlay ──────────────────────
    const overlayH = 90;
    const ovGrad = ctx.createLinearGradient(0, H - overlayH, 0, H);
    ovGrad.addColorStop(0, 'rgba(9,9,11,0)');
    ovGrad.addColorStop(0.3, 'rgba(9,9,11,0.75)');
    ovGrad.addColorStop(1, 'rgba(9,9,11,0.92)');
    ctx.fillStyle = ovGrad;
    ctx.fillRect(0, H - overlayH, W, overlayH);

    // Brand label
    drawPill(ctx, 180, H - 64, 'Page2Podcast', ACCENTDIM, `rgba(99,102,241,0.35)`, '#818cf8', 11, 10, 5, 100);
    // Tagline
    drawText(ctx, 'Convert any web page to a podcast — in one click', 180, H - 38, 'bold 18px system-ui', TEXT, 'center', 'middle');
  }

  // ─────────────────────────────────────────
  // ASSET 2 — Screenshot 2 (Settings) 1280×800
  // ─────────────────────────────────────────
  function drawAsset2() {
    const canvas = document.getElementById('c2');
    const ctx = canvas.getContext('2d');
    const W = 1280, H = 800;

    // Background with grid
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    // Subtle center glow
    drawGlow(ctx, W / 2, H / 2, 500, 0.10);

    // Decorative grid
    ctx.save();
    ctx.strokeStyle = 'rgba(99,102,241,0.04)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    for (let x = 0; x <= W; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y <= H; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();

    ctx.restore();

    const cardH = 620;
    const cardX = (W - cardW) / 2;
    const cardY = (H - cardH) / 2 - 20;

    ctx.shadowBlur = 60;
    ctx.shadowOffsetY = 12;
    fillRoundRect(ctx, cardX, cardY, cardW, cardH, 16, SURFACE);
    ctx.restore();

    drawRoundRect(ctx, cardX, cardY, cardW, cardH, 16, SURFACE, 'rgba(255,255,255,0.07)', 1);

    let y = cardY + 20;
    const pad = 24;
    const innerW = cardW - pad * 2;
    const lx = cardX + pad;

    // ── Settings topbar ──────────────────────
    // Back button
    const backW = 72, backH = 30;
    drawRoundRect(ctx, lx, y, backW, backH, 8, SURFACE, BORDERS, 1);
    ctx.save();
    ctx.strokeStyle = TEXT2;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(lx + 18, y + backH / 2 - 4);
    ctx.lineTo(lx + 12, y + backH / 2);
    ctx.lineTo(lx + 18, y + backH / 2 + 4);
    ctx.stroke();
    ctx.restore();
    drawText(ctx, 'Back', lx + 26, y + backH / 2, '500 12px system-ui', TEXT2, 'left', 'middle');
    drawText(ctx, 'Settings', lx + backW + 14, y + backH / 2, '600 15px system-ui', TEXT, 'left', 'middle');
    y += backH + 20;

    // ── API Keys card ─────────────────────────
    const apiCardH = 264;
    drawRoundRect(ctx, lx, y, innerW, apiCardH, 12, BG, BORDER, 1);

    let iy = y + 16;
    // Card header
    drawText(ctx, 'API Keys', lx + 16, iy, '600 13px system-ui', TEXT, 'left', 'alphabetic');
    drawText(ctx, 'Stored locally · never shared', lx + 16 + ctx.measureText('API Keys').width + 12, iy, '400 11px system-ui', TEXT3, 'left', 'alphabetic');
    iy += 6;
    ctx.save(); ctx.strokeStyle = BORDER; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx, iy); ctx.lineTo(lx + innerW, iy); ctx.stroke();
    ctx.restore();
    iy += 16;

    // Gemini field
    drawText(ctx, 'Gemini API key', lx + 16, iy, '500 11.5px system-ui', TEXT2, 'left', 'alphabetic');
    iy += 18;

    iy += 42;

    // OpenAI field
    ctx.save();
    ctx.font = '500 11.5px system-ui';
    ctx.fillStyle = TEXT2;
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('OpenAI API key', lx + 16, iy);
    ctx.restore();
    // RECOMMENDED badge
    const bx = lx + 16 + ctx.measureText('OpenAI API key').width + 10;
    drawRoundRect(ctx, bx, iy - 12, 88, 16, 100, ACCENTDIM, 'rgba(99,102,241,0.25)', 1);
    drawText(ctx, 'RECOMMENDED', bx + 44, iy - 4, '600 9px system-ui', '#818cf8', 'center', 'middle');
    iy += 18;
    drawInput(ctx, lx + 16, iy, innerW - 32, 32, 'sk-…', '');
    iy += 42;

    // ElevenLabs field
    ctx.save();
    ctx.font = '500 11.5px system-ui';
    ctx.fillStyle = TEXT2;
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('ElevenLabs API key', lx + 16, iy);
    ctx.restore();
    const bx2 = lx + 16 + ctx.measureText('ElevenLabs API key').width + 10;
    drawRoundRect(ctx, bx2, iy - 12, 60, 16, 100, SURFACE2, BORDERS, 1);
    drawText(ctx, 'OPTIONAL', bx2 + 30, iy - 4, '500 9px system-ui', TEXT3, 'center', 'middle');
    iy += 18;
    drawInput(ctx, lx + 16, iy, innerW - 32, 32, '', '••••••••••••••••••6a95');
    iy += 42;

    // Buttons
    const sbW = 100, sbH = 32;
    drawRoundRect(ctx, lx + 16, iy, sbW, sbH, 8, ACCENT, null);
    drawText(ctx, 'Save keys', lx + 16 + sbW / 2, iy + sbH / 2, '500 12px system-ui', '#fff', 'center', 'middle');
    drawRoundRect(ctx, lx + 16 + sbW + 10, iy, 90, sbH, 8, null, BORDERS, 1);
    drawText(ctx, 'Clear keys', lx + 16 + sbW + 10 + 45, iy + sbH / 2, '500 12px system-ui', TEXT2, 'center', 'middle');

    y += apiCardH + 12;

    // ── Preferences card ─────────────────────
    const prefCardH = 200;

    py2 += 6;
    ctx.save(); ctx.strokeStyle = BORDER; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx, py2); ctx.lineTo(lx + innerW, py2); ctx.stroke();
    ctx.restore();
    py2 += 16;

    // Row 1: TTS provider + Podcast name
    const halfW = (innerW - 32 - 12) / 2;
    drawText(ctx, 'TTS provider', lx + 16, py2, '500 11.5px system-ui', TEXT2, 'left', 'alphabetic');

    py2 += 18;
    drawInput(ctx, lx + 16, py2, halfW, 32, '', 'Stephen King');
    drawSelect(ctx, lx + 16 + halfW + 12, py2, halfW, 32, 'Medium  (5–7 min)');
    py2 += 44;

    // Tone row
    drawText(ctx, 'Tone', lx + 16, py2, '500 11.5px system-ui', TEXT2, 'left', 'alphabetic');

    ctx.fillRect(0, capY - 40, W, H - capY + 40);

    drawPill(ctx, W / 2, capY, 'Page2Podcast', ACCENTDIM, 'rgba(99,102,241,0.35)', '#818cf8', 11, 10, 5, 100);
    drawText(ctx, 'All your API keys stored locally — never shared', W / 2, capY + 28, 'bold 16px system-ui', TEXT, 'center', 'middle');
  }

  // ─────────────────────────────────────────
  // ASSET 3 — Small Promo Tile 440×280
  // ─────────────────────────────────────────
  function drawAsset3() {
    const canvas = document.getElementById('c3');
    const ctx = canvas.getContext('2d');
    const W = 440, H = 280;

    // Background
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    // Subtle radial glow top-left
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 280);
    g.addColorStop(0, 'rgba(99,102,241,0.18)');
    g.addColorStop(0.5, 'rgba(99,102,241,0.06)');
    g.addColorStop(1, 'rgba(99,102,241,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // ── Top-left logo + title ──────────────
    const logoH = 22;
    drawWaveform(ctx, 20 + 11, 28, logoH);
    drawText(ctx, 'Page2Podcast', 20 + 26, 28, 'bold 16px system-ui', TEXT, 'left', 'middle');

    // ── Center tagline ──────────────────────
    ctx.save();
    ctx.font = 'bold 40px system-ui';
    ctx.fillStyle = TEXT;
    ctx.textAlign = 'left';
    ctx.letterSpacing = '-1px';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('Any page.', 30, 128);
    ctx.fillStyle = ACCENT;
    ctx.fillText('Your podcast.', 30, 174);
    ctx.restore();

    // ── Feature chips ────────────────────────
    const chips = ['🎙 Gemini AI Script', '🔊 ElevenLabs Voice', '⬇ MP3 Download'];
    const chipY = H - 50;
    let chipX = 30;
    ctx.font = '500 12px system-ui';
    chips.forEach(label => {
      const tw = ctx.measureText(label).width;
      const cw = tw + 20;
      const ch = 28;
      drawRoundRect(ctx, chipX, chipY - ch / 2, cw, ch, 100, SURFACE, ACCENT, 1);
      drawText(ctx, label, chipX + cw / 2, chipY, '500 12px system-ui', TEXT, 'center', 'middle');
      chipX += cw + 10;

    // ── "Free" badge bottom-right ──────────
    const freeW = 42, freeH = 22;
    drawRoundRect(ctx, W - freeW - 16, H - freeH - 16, freeW, freeH, 6, ACCENT, null);
    drawText(ctx, 'Free', W - freeW - 16 + freeW / 2, H - freeH - 16 + freeH / 2, '600 11px system-ui', '#fff', 'center', 'middle');
  }

  // ─────────────────────────────────────────
  // ASSET 4 — Marquee Promo Tile 1400×560
  // ─────────────────────────────────────────
  function drawAsset4() {
    const canvas = document.getElementById('c4');
    const ctx = canvas.getContext('2d');
    const W = 1400, H = 560;

    // Background
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    // Grid pattern
    ctx.save();
    ctx.strokeStyle = 'rgba(99,102,241,0.03)';
    ctx.lineWidth = 1;
    const gs = 40;
    for (let x = 0; x <= W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y <= H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    ctx.restore();

    // Left half glow
    drawGlow(ctx, 200, H / 2, 400, 0.12);

    // Right glow behind panel
    drawGlow(ctx, 1050, H / 2, 350, 0.20);

    // ── LEFT HALF ─────────────────────────────
    const lpad = 72;
    let ly = 70;

    // Logo + name
    const logoH4 = 34;
    drawWaveform(ctx, lpad + 17, ly + logoH4 / 2, logoH4);
    drawText(ctx, 'Page2Podcast', lpad + 40, ly + logoH4 / 2, '500 20px system-ui', TEXT2, 'left', 'middle');
    ly += logoH4 + 44;

    // Hero text
    ctx.save();
    ctx.font = 'bold 58px system-ui';
    ctx.fillStyle = TEXT;
    ctx.textBaseline = 'alphabetic';
    ctx.letterSpacing = '-1.5px';
    ctx.fillText('Turn any web page', lpad, ly);
    ly += 68;
    ctx.fillStyle = ACCENT;
    ctx.fillText('into a podcast.', lpad, ly);
    ctx.restore();
    ly += 22;

    // Subtitle
    drawText(ctx,
      'Gemini AI writes the script. ElevenLabs speaks it. You download the MP3.',
      lpad, ly,
      '400 17px system-ui', TEXT2, 'left', 'alphabetic');
    ly += 46;

    // 4 feature badges in 2×2 grid
    const badges = [
      ['✦ AI-written script', '✦ Natural voice'],
      ['✦ Any website',       '✦ One-click MP3'],
    ];
    const badgeW = 190, badgeH = 38, badgeGap = 12;
    badges.forEach((row, ri) => {
      row.forEach((label, ci) => {
        const bx = lpad + ci * (badgeW + badgeGap);
        const by = ly + ri * (badgeH + badgeGap);
        drawRoundRect(ctx, bx, by, badgeW, badgeH, 8, SURFACE, 'rgba(255,255,255,0.06)', 1);
        drawText(ctx, label, bx + 14, by + badgeH / 2, '400 13px system-ui', TEXT2, 'left', 'middle');
      });
    });

    // ── RIGHT HALF: Extension panel ──────────
    const panelW = 320;
    const panelH = H - 80;
    const panelX = W - 80 - panelW;
    const panelY = (H - panelH) / 2;

    // Panel shadow
    ctx.save();
    ctx.shadowColor = 'rgba(99,102,241,0.25)';
    ctx.shadowBlur = 60;
    ctx.shadowOffsetX = -10;
    fillRoundRect(ctx, panelX, panelY, panelW, panelH, 14, SURFACE);
    ctx.restore();

    drawExtensionPanel(ctx, panelX, panelY, panelW, panelH, {
      scale: 1,
      showDownload: true,
      showScript: true,
      activeStep: 2,
    });

    // Divider line center
    ctx.save();
    const divX = W / 2;
    const divGrad = ctx.createLinearGradient(divX, 40, divX, H - 40);
    divGrad.addColorStop(0, 'rgba(255,255,255,0)');
    divGrad.addColorStop(0.3, 'rgba(255,255,255,0.05)');
    divGrad.addColorStop(0.7, 'rgba(255,255,255,0.05)');
    divGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = divGrad;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(divX, 40);
    ctx.lineTo(divX, H - 40);
    ctx.stroke();
    ctx.restore();
  }

  // ─────────────────────────────────────────
  // RENDER ALL
  // ─────────────────────────────────────────
  window.addEventListener('load', () => {
    drawAsset1();
    drawAsset2();
    drawAsset3();
    drawAsset4();
  });
